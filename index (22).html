<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f5f5f3;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: rgba(0,0,0,0.72);
    cursor: default;
  }

  /* ── Start screen ── */
  #start-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    background: #f5f5f3;
    transition: opacity 0.7s ease;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }

  #start-screen h1 {
    font-size: clamp(2.2rem, 5vw, 3.8rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.78);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  #start-screen .subtitle {
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    font-style: italic;
    color: rgba(0,0,0,0.36);
    letter-spacing: 0.04em;
    margin-bottom: 2.8rem;
  }
  #start-btn {
    display: inline-flex; align-items: center; gap: 0.6rem;
    padding: 0.8rem 2.2rem;
    border: 1.5px solid rgba(0,0,0,0.22);
    border-radius: 40px;
    background: transparent;
    color: rgba(0,0,0,0.58);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.15s;
  }
  #start-btn:hover {
    background: rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.38);
    color: rgba(0,0,0,0.82);
    transform: translateY(-1px);
  }

  /* ── Main coaching screen ── */
  #coaching-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
    padding: 2rem;
    gap: 2rem;
  }
  #coaching-screen.visible { opacity: 1; pointer-events: auto; }

  #coaching-title {
    text-align: center;
    flex-shrink: 0;
  }
  #coaching-title h1 {
    font-size: clamp(1.3rem, 2.8vw, 2rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.50);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  #coaching-title .subtitle {
    font-size: clamp(0.78rem, 1.5vw, 0.95rem);
    font-style: italic;
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.04em;
  }

  /* ── THE METER BOX ── */
  #meter-wrap {
    position: relative;
    width: min(460px, 86vw);
    height: min(280px, 42vh);
    flex-shrink: 0;
  }

  /* The fill — grows from bottom */
  #meter-fill {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    background: hsl(220, 80%, 52%);
    border-radius: 0 0 3px 3px;
    /* height transitions quickly; color slightly slower */
    transition: height 0.18s cubic-bezier(0.4,0,0.2,1),
                background 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 1;
  }

  /* Outer border — sits on top so it's always crisp */
  #meter-border {
    position: absolute; inset: 0;
    border: 2px solid rgba(0,0,0,0.20);
    border-radius: 4px;
    z-index: 3;
    pointer-events: none;
  }

  /* Horizontal tick lines at calibrated levels */
  .tick {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: rgba(0,0,0,0.10);
    z-index: 2;
    pointer-events: none;
  }
  /* Tick label */
  .tick-label {
    position: absolute;
    right: calc(100% + 10px);
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.30);
    white-space: nowrap;
    pointer-events: none;
  }

  /* Score number inside box */
  #meter-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 4; pointer-events: none;
  }
  #level-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    opacity: 0;
    transition: opacity 0.5s;
    text-shadow: 0 1px 3px rgba(0,0,0,0.15);
  }
  #level-text.visible { opacity: 1; }

  /* ── Instructions ── */
  #instructions {
    text-align: center;
    display: flex; flex-direction: column; gap: 0.35rem;
    flex-shrink: 0;
  }
  #instructions p {
    font-size: clamp(0.76rem, 1.5vw, 0.88rem);
    font-weight: 300;
    color: rgba(0,0,0,0.28);
    letter-spacing: 0.03em;
  }

  /* ── Debug ── */
  #debug {
    position: fixed; top: 1.2rem; right: 1.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: rgba(0,0,0,0.20);
    letter-spacing: 0.06em;
    line-height: 1.9;
    text-align: right;
    z-index: 200;
  }
</style>
</head>
<body>

<!-- Start screen -->
<div id="start-screen">
  <h1>Voice Coaching</h1>
  <p class="subtitle">See how your voice moves</p>
  <button id="start-btn">
    <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
      <circle cx="6" cy="6" r="5.5" stroke="currentColor"/>
      <path d="M4.5 4l4 2-4 2V4z" fill="currentColor"/>
    </svg>
    Allow microphone
  </button>
</div>

<!-- Coaching screen -->
<div id="coaching-screen">
  <div id="coaching-title">
    <h1>Voice Coaching</h1>
    <p class="subtitle">See how your voice moves</p>
  </div>

  <div id="meter-wrap">
    <!-- Calibrated tick marks (new formula: (st-6)/8) -->
    <!-- Expressive ~17st → score ~1.0 → top -->
    <!-- Normal     ~15st → score ~1.0 → shown as 88% -->
    <!-- Monotone   ~11st → score ~0.63 → bottom 63% -->
    <div class="tick" style="bottom:88%" id="tick-exp">
      <span class="tick-label">Expressive</span>
    </div>
    <div class="tick" style="bottom:63%" id="tick-norm">
      <span class="tick-label">Normal</span>
    </div>
    <div class="tick" style="bottom:31%" id="tick-mono">
      <span class="tick-label">Monotone</span>
    </div>

    <!-- Color fill (grows upward) -->
    <div id="meter-fill"></div>

    <!-- Crisp border on top -->
    <div id="meter-border"></div>

    <!-- Level label inside fill -->
    <div id="meter-label"><span id="level-text"></span></div>
  </div>

  <div id="instructions">
    <p>Speak naturally — more variation brings warmer colours</p>
    <p>Silence returns the meter to white</p>
  </div>
</div>

<!-- Debug info -->
<div id="debug">
  <span id="dbg-hz">— Hz</span><br/>
  <span id="dbg-st">— st</span><br/>
  <span id="dbg-score">score —</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  VOICE COACHING
//  Metric: semitone range (10th–90th percentile of F0 window)
//
//  Calibration from librosa pyin analysis of reference files:
//  ┌──────────────┬────────────┬──────────┬────────────────┐
//  │ Category     │ Semitones  │ Score    │ Color          │
//  ├──────────────┼────────────┼──────────┼────────────────┤
//  │ Monotone     │ ~11 st     │ ~0.44    │ Blue           │
//  │ Normal       │ ~15 st     │ ~0.69    │ Green          │
//  │ Expressive   │ ~17 st     │ ~0.81    │ Orange         │
//  └──────────────┴────────────┴──────────┴────────────────┘
//
//  Score formula: clamp((semitones - 4) / 16, 0, 1)
//  4 st  = baseline (score 0.0)
//  20 st = ceiling  (score 1.0)
// ═══════════════════════════════════════════════════════════

(function () {
  'use strict';

  const startScreen    = document.getElementById('start-screen');
  const coachingScreen = document.getElementById('coaching-screen');
  const startBtn       = document.getElementById('start-btn');
  const meterFill      = document.getElementById('meter-fill');
  const levelText      = document.getElementById('level-text');
  const dbgHz          = document.getElementById('dbg-hz');
  const dbgSt          = document.getElementById('dbg-st');
  const dbgScore       = document.getElementById('dbg-score');

  let audioCtx    = null;
  let analyser    = null;
  let buffer      = null;
  let isListening = false;

  // Pitch history sliding window
  const WINDOW_SEC = 2.0;
  let pitchHistory = [];

  // Score smoothing — asymmetric (quick rise, slow fall)
  let smoothScore  = 0;
  const RISE_K     = 0.22;
  const DECAY_K    = 0.04;

  // Silence timer for clearing history
  let silenceTimer = null;

  // ─────────────────────────────────────────────
  //  YIN PITCH DETECTION
  // ─────────────────────────────────────────────
  function yinPitch(float32, sampleRate) {
    const half      = Math.floor(float32.length / 2);
    const threshold = 0.12;

    const diff = new Float32Array(half);
    for (let tau = 1; tau < half; tau++) {
      let s = 0;
      for (let i = 0; i < half; i++) {
        const d = float32[i] - float32[i + tau];
        s += d * d;
      }
      diff[tau] = s;
    }

    const cmnd = new Float32Array(half);
    cmnd[0] = 1;
    let running = 0;
    for (let tau = 1; tau < half; tau++) {
      running += diff[tau];
      cmnd[tau] = diff[tau] * tau / running;
    }

    let tau = 2;
    while (tau < half) {
      if (cmnd[tau] < threshold) {
        while (tau + 1 < half && cmnd[tau + 1] < cmnd[tau]) tau++;
        break;
      }
      tau++;
    }
    if (tau === half || cmnd[tau] >= threshold) return -1;

    if (tau > 0 && tau < half - 1) {
      const s0 = cmnd[tau - 1], s1 = cmnd[tau], s2 = cmnd[tau + 1];
      tau += (s2 - s0) / (2 * (2 * s1 - s2 - s0));
    }

    return sampleRate / tau;
  }

  // ─────────────────────────────────────────────
  //  SEMITONE RANGE SCORE
  //
  //  Computes 10th–90th percentile F0 range in semitones,
  //  then maps through the calibrated scale.
  // ─────────────────────────────────────────────
  function computeScore() {
    const valid = pitchHistory.filter(p => p.hz > 60 && p.hz < 600);
    if (valid.length < 3) return 0;

    const sorted = valid.map(p => p.hz).sort((a, b) => a - b);
    const n      = sorted.length;
    const p10    = sorted[Math.max(0, Math.floor(n * 0.10))];
    const p90    = sorted[Math.min(n - 1, Math.floor(n * 0.90))];

    if (p10 <= 0 || p90 <= p10) return 0;

    const semitones = 12 * Math.log2(p90 / p10);
    dbgSt.textContent = semitones.toFixed(1) + ' st';

    // Recalibrated: 6 st = score 0, 14 st = score 1
    // Measured reference files: monotone ~11st, normal ~15st, expressive ~17st
    // Compressing the window so normal speech (15st) → score ~1.0 (red/orange)
    // and monotone (11st) → score ~0.63 (green)
    return Math.max(0, Math.min((semitones - 6) / 8, 1.0));
  }

  // ─────────────────────────────────────────────
  //  COLOR MAPPING
  //
  //  Fully vivid throughout — no pale/washed colors.
  //  White only during silence (score < 0.02).
  //
  //  score 0.00 → white (silence)
  //  score 0.10 → deep blue
  //  score 0.44 → mid blue        ← monotone speech
  //  score 0.69 → green           ← normal speech
  //  score 0.81 → orange          ← expressive speech
  //  score 1.00 → vivid red
  // ─────────────────────────────────────────────
  function scoreToCSS(score) {
    if (score < 0.02) return 'hsl(0,0%,97%)';

    // Calibration (formula: (st-6)/8):
    //   score 0.31 ~ 8.5 st  deep blue
    //   score 0.63 ~ 11 st   teal/cyan  (monotone)
    //   score 0.88 ~ 13 st   green      (normal)
    //   score 1.00 ~ 14 st   red        (expressive)
    let h, s, l;

    if (score < 0.31) {
      const t = score / 0.31;
      h = 240; s = 80; l = 50 - t * 2;
    } else if (score < 0.63) {
      const t = (score - 0.31) / (0.63 - 0.31);
      h = 240 - t * 50;
      s = 82; l = 48;
    } else if (score < 0.88) {
      const t = (score - 0.63) / (0.88 - 0.63);
      h = 190 - t * 80;
      s = 85; l = 44;
    } else {
      const t = (score - 0.88) / (1.0 - 0.88);
      h = 110 - t * 110;
      s = 90; l = 44;
    }

    return `hsl(${h.toFixed(1)},${s.toFixed(0)}%,${l.toFixed(0)}%)`;
  }

  function levelLabel(score) {
    if (score < 0.08)  return '';
    if (score < 0.45)  return 'Monotone';
    if (score < 0.72)  return 'Normal';
    if (score < 0.90)  return 'Expressive';
    return 'Very expressive';
  }

  // ─────────────────────────────────────────────
  //  ANIMATION LOOP
  // ─────────────────────────────────────────────
  function loop() {
    if (!isListening) return;
    requestAnimationFrame(loop);

    analyser.getFloatTimeDomainData(buffer);

    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / buffer.length);

    if (rms > 0.005) {
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }

      const hz = yinPitch(buffer, audioCtx.sampleRate);
      if (hz > 60 && hz < 600) {
        const now = performance.now() / 1000;
        pitchHistory.push({ hz, t: now });
        pitchHistory = pitchHistory.filter(p => p.t > now - WINDOW_SEC);
        dbgHz.textContent = hz.toFixed(0) + ' Hz';
      }

      const raw = computeScore();
      const k   = raw > smoothScore ? RISE_K : DECAY_K;
      smoothScore += (raw - smoothScore) * k;

    } else {
      if (!silenceTimer) {
        silenceTimer = setTimeout(() => { pitchHistory = []; silenceTimer = null; }, 600);
      }
      smoothScore += (0 - smoothScore) * DECAY_K;
      dbgHz.textContent = '— Hz';
      dbgSt.textContent = '— st';
    }

    dbgScore.textContent = 'score ' + smoothScore.toFixed(3);

    // Update meter
    meterFill.style.height  = (smoothScore * 100).toFixed(2) + '%';
    meterFill.style.background = scoreToCSS(smoothScore);

    const lbl = levelLabel(smoothScore);
    levelText.textContent = lbl;
    levelText.classList.toggle('visible', lbl !== '');
  }

  // ─────────────────────────────────────────────
  //  AUDIO SETUP
  // ─────────────────────────────────────────────
  async function startAudio() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx     = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser     = audioCtx.createAnalyser();
      analyser.fftSize              = 2048;
      analyser.smoothingTimeConstant = 0;
      source.connect(analyser);
      buffer = new Float32Array(analyser.fftSize);

      isListening = true;
      startScreen.classList.add('hidden');
      setTimeout(() => coachingScreen.classList.add('visible'), 500);
      loop();

    } catch (err) {
      startBtn.textContent = 'Microphone access denied';
      startBtn.style.opacity = '0.5';
      startBtn.style.cursor  = 'default';
    }
  }

  startBtn.addEventListener('click', () => {
    startBtn.textContent = 'Listening…';
    startBtn.disabled    = true;
    startAudio();
  });

})();
</script>
</body>
</html>
