<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --text: rgba(0,0,0,0.75);
    --text-dim: rgba(0,0,0,0.32);
    --accent: rgba(0,0,0,0.08);
    --transition-speed: 1.4s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    cursor: default;
  }

  /* ── Animated background ── */
  #bg {
    position: fixed; inset: 0;
    background: #ffffff;
    transition: background var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 0;
  }
  #bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 40%, rgba(255,255,255,0.3) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Glow orb ── */
  #orb {
    position: fixed;
    top: 50%; left: 50%;
    width: 420px; height: 420px;
    transform: translate(-50%, -54%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
    filter: blur(40px);
    transition: opacity var(--transition-speed) ease,
                filter var(--transition-speed) ease;
    opacity: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── UI shell ── */
  #shell {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    padding: 2rem;
    gap: 0;
  }

  /* ── Title block ── */
  #title-block {
    text-align: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #title-block h1 {
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.78);
    line-height: 1;
    margin-bottom: 0.55rem;
  }
  #title-block .subtitle {
    font-size: clamp(1rem, 2.2vw, 1.3rem);
    font-weight: 300;
    font-style: italic;
    color: rgba(0,0,0,0.38);
    letter-spacing: 0.04em;
  }

  /* ── Divider ── */
  .divider {
    width: 1px; height: 56px;
    background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.15), transparent);
    margin: 2.4rem auto;
    transition: opacity 0.8s ease;
  }

  /* ── Start button ── */
  #start-btn {
    display: inline-flex; align-items: center; gap: 0.7rem;
    padding: 0.85rem 2.4rem;
    border: 1px solid rgba(0,0,0,0.18);
    border-radius: 40px;
    background: rgba(0,0,0,0.04);
    color: rgba(0,0,0,0.6);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.2s;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #start-btn:hover {
    background: rgba(0,0,0,0.08);
    border-color: rgba(0,0,0,0.3);
    color: rgba(0,0,0,0.85);
    transform: translateY(-1px);
  }
  #start-btn:active { transform: translateY(0); }
  #start-btn svg { opacity: 0.7; }

  /* ── Instructions ── */
  #instructions {
    opacity: 0; pointer-events: none;
    transition: opacity 1.2s ease;
    text-align: center;
    position: absolute;
    bottom: clamp(2rem, 6vw, 4rem);
    left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 0.55rem;
  }
  #instructions p {
    font-size: clamp(0.8rem, 1.8vw, 0.96rem);
    font-weight: 300;
    color: rgba(0,0,0,0.36);
    letter-spacing: 0.04em;
    line-height: 1.6;
    white-space: nowrap;
  }
  #instructions.visible { opacity: 1; pointer-events: auto; }

  /* ── Debug overlay ── */
  #debug {
    position: fixed; top: 1.4rem; right: 1.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: rgba(0,0,0,0.28);
    letter-spacing: 0.06em;
    line-height: 1.9;
    text-align: right;
    z-index: 20;
    transition: opacity 0.8s;
    opacity: 0;
  }
  #debug.visible { opacity: 1; }

  /* ── Active state: fade title up slightly ── */
  .listening #title-block { transform: translateY(-8px); }
  .listening .divider { opacity: 0.5; }

  /* ── Hint overlay ── */
  #hint {
    position: fixed; bottom: clamp(2rem, 6vw, 4rem); left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: rgba(0,0,0,0.35);
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 2s ease;
    pointer-events: none;
    z-index: 15;
    text-align: center;
  }

  /* ── Score ring ── */
  #score-ring {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -54%);
    width: 180px; height: 180px;
    opacity: 0;
    transition: opacity 1s ease;
    z-index: 5;
    pointer-events: none;
  }
  #score-ring circle {
    fill: none;
    stroke: rgba(255,255,255,0.18);
    stroke-width: 0.8;
    stroke-dasharray: 502;
    stroke-dashoffset: 502;
    stroke-linecap: round;
    transform-origin: center;
    transform: rotate(-90deg);
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  /* mobile */
  @media (max-width: 500px) {
    #orb { width: 280px; height: 280px; }
    #score-ring { width: 130px; height: 130px; }
    #score-ring circle { stroke-dasharray: 365; stroke-dashoffset: 365; }
  }
</style>
</head>
<body>

<!-- Fullscreen color bg -->
<div id="bg"></div>

<!-- Glow orb -->
<div id="orb"></div>

<!-- Score ring SVG -->
<svg id="score-ring" viewBox="0 0 180 180">
  <circle id="ring-circle" cx="90" cy="90" r="80" />
</svg>

<!-- Debug -->
<div id="debug">
  <span id="dbg-pitch">— Hz</span><br/>
  <span id="dbg-score">score —</span>
</div>

<!-- Main UI -->
<div id="shell">
  <div id="title-block">
    <h1>Voice Coaching</h1>
    <p class="subtitle">See how your voice moves</p>
  </div>
  <div class="divider"></div>
  <button id="start-btn">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <circle cx="6" cy="6" r="5.5" stroke="currentColor"/>
      <path d="M4.5 4l4 2-4 2V4z" fill="currentColor"/>
    </svg>
    Allow microphone
  </button>
</div>

<!-- Instructions shown while active -->
<div id="instructions">
  <p>Speak naturally and observe the colour</p>
  <p>More variation brings warmer tones</p>
  <p>A steady voice becomes calm and still</p>
</div>

<!-- Ambient hint -->
<div id="hint"></div>

<script>
// ─────────────────────────────────────────────
//  VOICE COACHING — Client-side only, no backend
//  Pitch: YIN algorithm
//  Colour: HSV intonation mapping
// ─────────────────────────────────────────────

(function () {
  'use strict';

  // ── DOM refs ──
  const bg          = document.getElementById('bg');
  const orb         = document.getElementById('orb');
  const startBtn    = document.getElementById('start-btn');
  const instructions= document.getElementById('instructions');
  const hintEl      = document.getElementById('hint');
  const dbgPitch    = document.getElementById('dbg-pitch');
  const dbgScore    = document.getElementById('dbg-score');
  const debug       = document.getElementById('debug');
  const scoreRing   = document.getElementById('score-ring');
  const ringCircle  = document.getElementById('ring-circle');
  const body        = document.body;

  // ── State ──
  let audioCtx      = null;
  let analyser      = null;
  let buffer        = null;
  let rafId         = null;
  let isListening   = false;

  // ── Intonation engine ──
  const WINDOW_SEC  = 1.5;
  const SMOOTH_K    = 0.12;     // EMA smoothing factor
  let pitchHistory  = [];
  let smoothScore   = 0;
  let smoothColor   = { h: 0, s: 0, l: 95 };  // target
  let currentColor  = { h: 0, s: 0, l: 95 };  // displayed

  // ── Hints cycle ──
  const HINTS = [
    'Notice how your tone shapes the space',
    'Try adding more variation',
    'Let your voice breathe freely',
    'Steady breath, expressive sound',
  ];
  let hintIdx = 0;
  let hintTimer = null;

  // ────────────────────────────────────────────
  //  YIN PITCH DETECTION
  //  Based on de Cheveigné & Kawahara (2002)
  //  Returns frequency in Hz, or -1 if none found
  // ────────────────────────────────────────────
  function yinPitch(float32, sampleRate) {
    const N    = float32.length;
    const half = Math.floor(N / 2);
    const threshold = 0.12;   // lower = more sensitive, higher = fewer false positives

    // Step 1 & 2: Difference function d(τ)
    const diff = new Float32Array(half);
    for (let tau = 0; tau < half; tau++) {
      let sum = 0;
      for (let i = 0; i < half; i++) {
        const delta = float32[i] - float32[i + tau];
        sum += delta * delta;
      }
      diff[tau] = sum;
    }

    // Step 3: Cumulative Mean Normalised Difference Function (CMND)
    const cmnd = new Float32Array(half);
    cmnd[0] = 1;
    let runningSum = 0;
    for (let tau = 1; tau < half; tau++) {
      runningSum += diff[tau];
      cmnd[tau] = diff[tau] * tau / runningSum;
    }

    // Step 4: Absolute threshold — find first dip below threshold
    let tau = 2;
    while (tau < half) {
      if (cmnd[tau] < threshold) {
        // find local minimum in this dip
        while (tau + 1 < half && cmnd[tau + 1] < cmnd[tau]) tau++;
        break;
      }
      tau++;
    }

    if (tau === half || cmnd[tau] >= threshold) return -1;

    // Step 5: Parabolic interpolation for sub-sample precision
    if (tau > 0 && tau < half - 1) {
      const s0 = cmnd[tau - 1];
      const s1 = cmnd[tau];
      const s2 = cmnd[tau + 1];
      tau += (s2 - s0) / (2 * (2 * s1 - s2 - s0));
    }

    return sampleRate / tau;
  }

  // ────────────────────────────────────────────
  //  INTONATION ENGINE
  // ────────────────────────────────────────────

  function addPitch(hz, elapsed) {
    const now = performance.now() / 1000;
    pitchHistory.push({ hz, t: now });
    // Trim to window
    const cutoff = now - WINDOW_SEC;
    pitchHistory = pitchHistory.filter(p => p.t > cutoff);
  }

  function computeScore() {
    const valid = pitchHistory.filter(p => p.hz > 60 && p.hz < 1200);
    if (valid.length < 4) return 0;

    const vals = valid.map(p => p.hz);
    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
    if (mean < 1) return 0;

    const variance = vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length;
    const std = Math.sqrt(variance);
    const raw = std / mean;                  // coefficient of variation

    // Clamp: typical CoV range 0 – 0.25 maps to 0 – 1
    const normalized = Math.min(raw / 0.22, 1.0);
    return normalized;
  }

  // ────────────────────────────────────────────
  //  COLOR MAPPING: intonation → warm colour
  // ────────────────────────────────────────────
  //  0.0  →  grey  (no expression)
  //  0.3  →  blue-teal
  //  0.5  →  green
  //  0.7  →  amber/yellow
  //  0.85 →  orange
  //  1.0  →  red
  // ────────────────────────────────────────────

  function scoreToHSL(score) {
    // Non-linear easing — feels more responsive at low end
    const eased = score * score;

    // Saturation: ramps up fast and stays very high for vivid colors on white
    const saturation = eased * 92;

    // Lightness: on white bg, we go from near-white (95) down to vibrant midtones (48)
    const lightness = 95 - eased * 47;

    // Hue: sweep from 220° (blue) → 0° (red) through cyan→green→yellow→orange
    const hue = Math.max(0, 220 - eased * 220);

    return { h: hue, s: saturation, l: lightness };
  }

  function lerpColor(a, b, t) {
    // Shortest-path hue lerp
    let dh = b.h - a.h;
    if (dh > 180)  dh -= 360;
    if (dh < -180) dh += 360;
    return {
      h: a.h + dh * t,
      s: a.s + (b.s - a.s) * t,
      l: a.l + (b.l - a.l) * t,
    };
  }

  function applyColor(c) {
    const bg_color = `hsl(${c.h.toFixed(1)}, ${c.s.toFixed(1)}%, ${c.l.toFixed(1)}%)`;
    bg.style.background = bg_color;

    // Orb: deeper, more saturated version of the hue for the glow
    const orbS = Math.min(c.s * 1.1, 100);
    const orbL = Math.max(c.l - 22, 30);
    orb.style.background =
      `radial-gradient(circle, hsl(${c.h.toFixed(1)},${orbS.toFixed(0)}%,${orbL.toFixed(0)}%) 0%, transparent 70%)`;
    orb.style.opacity = c.s > 3 ? (0.25 + smoothScore * 0.55).toFixed(2) : '0';

    // Ring arc
    const circumference = parseFloat(ringCircle.getAttribute('stroke-dasharray') || '502');
    const offset = circumference * (1 - smoothScore);
    ringCircle.style.strokeDashoffset = offset.toFixed(1);
    ringCircle.style.stroke = `hsla(${c.h.toFixed(1)},${orbS.toFixed(0)}%,${(orbL * 0.85).toFixed(0)}%,0.6)`;
  }

  // ────────────────────────────────────────────
  //  ANIMATION LOOP
  // ────────────────────────────────────────────

  function loop() {
    if (!isListening) return;
    rafId = requestAnimationFrame(loop);

    analyser.getFloatTimeDomainData(buffer);

    // Energy gate — ignore near-silence
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / buffer.length);

    let rawScore = 0;

    if (rms > 0.012) {
      const hz = yinPitch(buffer, audioCtx.sampleRate);
      if (hz > 60 && hz < 1200) {
        addPitch(hz, 0);
        dbgPitch.textContent = hz.toFixed(1) + ' Hz';
      } else {
        dbgPitch.textContent = '— Hz';
      }
      rawScore = computeScore();
    } else {
      dbgPitch.textContent = '— Hz';
      // Silence decays history faster
      pitchHistory = [];
      rawScore = 0;
    }

    // Exponential smoothing
    smoothScore += (rawScore - smoothScore) * SMOOTH_K;

    // Target colour
    const target = scoreToHSL(smoothScore);
    // Interpolate current → target (colour lerp at separate speed)
    currentColor = lerpColor(currentColor, target, 0.06);

    applyColor(currentColor);

    dbgScore.textContent = 'score ' + smoothScore.toFixed(3);
  }

  // ────────────────────────────────────────────
  //  AUDIO SETUP
  // ────────────────────────────────────────────

  async function startAudio() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);

      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;          // ~46ms frame at 44100 Hz
      analyser.smoothingTimeConstant = 0;

      source.connect(analyser);
      buffer = new Float32Array(analyser.fftSize);

      isListening = true;
      startListeningUI();
      loop();

    } catch (err) {
      startBtn.textContent = 'Microphone access denied';
      startBtn.style.opacity = '0.5';
      startBtn.style.cursor = 'default';
    }
  }

  // ────────────────────────────────────────────
  //  UI STATE TRANSITIONS
  // ────────────────────────────────────────────

  function startListeningUI() {
    body.classList.add('listening');
    startBtn.style.opacity = '0';
    startBtn.style.pointerEvents = 'none';
    startBtn.style.transform = 'scale(0.9)';

    setTimeout(() => {
      startBtn.style.display = 'none';
      instructions.classList.add('visible');
      debug.classList.add('visible');
      scoreRing.style.opacity = '0.9';
    }, 600);

    // Start hint cycle after 6s
    hintTimer = setTimeout(cycleHint, 6000);
  }

  function showHint(text) {
    hintEl.style.opacity = '0';
    hintEl.textContent = text;
    setTimeout(() => { hintEl.style.opacity = '1'; }, 80);
    setTimeout(() => { hintEl.style.opacity = '0'; }, 5000);
  }

  function cycleHint() {
    showHint(HINTS[hintIdx % HINTS.length]);
    hintIdx++;
    hintTimer = setTimeout(cycleHint, 12000);
  }

  // ── Entry point ──
  startBtn.addEventListener('click', () => {
    startBtn.textContent = 'Listening…';
    startBtn.disabled = true;
    startAudio();
  });

})();
</script>
</body>
</html>
