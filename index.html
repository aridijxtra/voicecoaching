<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voice ADx Coaching</title>

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #444;
        color: white;
        overflow: hidden;
        transition: background-color 0.2s linear;
    }

    #container {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(20px);
        text-align: center;
        padding: 20px;
    }

    h1 {
        font-weight: 600;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    p {
        opacity: 0.85;
        max-width: 400px;
        line-height: 1.5;
    }

    #startBtn {
        margin-top: 25px;
        padding: 12px 22px;
        border-radius: 25px;
        border: none;
        background: rgba(255,255,255,0.15);
        color: white;
        font-size: 16px;
        cursor: pointer;
        backdrop-filter: blur(10px);
    }

    #startBtn:hover {
        background: rgba(255,255,255,0.25);
    }

    #debug {
        position: absolute;
        bottom: 15px;
        left: 15px;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>

<body>

<div id="container">
    <h1>Voice Coaching</h1>
    <p>See how your voice moves</p>
    <p id="instruction">Allow microphone access to begin</p>
    <button id="startBtn">Start</button>
</div>

<div id="debug"></div>

<script>
let audioContext;
let analyser;
let buffer;
let running = false;

let pitchHistory = [];
let smoothedScore = 0;

// ---------- YIN PITCH DETECTION ----------
function yin(buffer, sampleRate) {
    const threshold = 0.1;
    const tauMax = Math.floor(sampleRate / 50);
    const tauMin = Math.floor(sampleRate / 500);

    let yinBuffer = new Float32Array(tauMax);

    for (let tau = 1; tau < tauMax; tau++) {
        let sum = 0;
        for (let i = 0; i < tauMax; i++) {
            let delta = buffer[i] - buffer[i + tau];
            sum += delta * delta;
        }
        yinBuffer[tau] = sum;
    }

    let runningSum = 0;
    yinBuffer[0] = 1;
    for (let tau = 1; tau < tauMax; tau++) {
        runningSum += yinBuffer[tau];
        yinBuffer[tau] *= tau / runningSum;
    }

    for (let tau = tauMin; tau < tauMax; tau++) {
        if (yinBuffer[tau] < threshold) {
            while (tau + 1 < tauMax && yinBuffer[tau + 1] < yinBuffer[tau]) {
                tau++;
            }
            return sampleRate / tau;
        }
    }

    return null;
}

// ---------- INTONATION ----------
function computeIntonation(pitch) {
    pitchHistory.push(pitch);
    if (pitchHistory.length > 30) pitchHistory.shift();

    const mean = pitchHistory.reduce((a,b)=>a+b,0) / pitchHistory.length;
    const variance = pitchHistory.reduce((a,b)=>a+(b-mean)*(b-mean),0) / pitchHistory.length;
    const std = Math.sqrt(variance);

    let score = std / mean;
    score = Math.min(score, 0.3) / 0.3;

    smoothedScore = 0.9 * smoothedScore + 0.1 * score;

    return smoothedScore;
}

// ---------- COLOR ----------
function mapColor(score) {
    let eased = score * score;

    let hue;
    if (eased < 0.2) hue = 240 - eased * 200;
    else if (eased < 0.5) hue = 120 - (eased - 0.2) * 200;
    else hue = 60 - (eased - 0.5) * 120;

    let sat = Math.min(eased * 1.2, 1);
    let light = 40 + eased * 30;

    return `hsl(${hue}, ${sat*100}%, ${light}%)`;
}

// ---------- LOOP ----------
function update() {
    if (!running) return;

    analyser.getFloatTimeDomainData(buffer);

    const pitch = yin(buffer, audioContext.sampleRate);

    if (pitch && pitch > 80 && pitch < 400) {
        const score = computeIntonation(pitch);
        const color = mapColor(score);
        document.body.style.backgroundColor = color;

        document.getElementById("debug").innerText =
            `Pitch: ${pitch.toFixed(1)} Hz | Intonation: ${score.toFixed(2)}`;
    }

    requestAnimationFrame(update);
}

// ---------- START ----------
document.getElementById("startBtn").onclick = async () => {

    audioContext = new (window.AudioContext || window.webkitAudioContext)();

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();

    analyser.fftSize = 2048;
    buffer = new Float32Array(analyser.fftSize);

    source.connect(analyser);

    running = true;

    document.getElementById("instruction").innerText =
        "Observe the ADx color";

    update();
};
</script>

</body>
</html>
