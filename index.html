<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voice Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #f4f4f2;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: rgba(0,0,0,0.70);
  }

  /* ── Start screen ── */
  #start-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    z-index: 100;
    background: #f4f4f2;
    transition: opacity 0.7s ease;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }
  #start-screen h1 {
    font-size: clamp(2.4rem, 6vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.78);
    line-height: 1;
    margin-bottom: 0.55rem;
  }
  #start-screen p.sub {
    font-size: clamp(1rem, 2.2vw, 1.25rem);
    font-style: italic;
    color: rgba(0,0,0,0.35);
    letter-spacing: 0.05em;
    margin-bottom: 3rem;
  }
  #start-btn {
    display: inline-flex; align-items: center; gap: 0.6rem;
    padding: 0.85rem 2.4rem;
    border: 1.5px solid rgba(0,0,0,0.20);
    border-radius: 40px;
    background: transparent;
    color: rgba(0,0,0,0.55);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.15s;
  }
  #start-btn:hover {
    background: rgba(0,0,0,0.05);
    border-color: rgba(0,0,0,0.35);
    color: rgba(0,0,0,0.80);
    transform: translateY(-1px);
  }

  /* ── Coaching screen ── */
  #coaching-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease;
    padding: 1.5rem 2rem;
    gap: 1.4rem;
  }
  #coaching-screen.visible { opacity: 1; pointer-events: auto; }

  #coaching-title {
    text-align: center;
    flex-shrink: 0;
  }
  #coaching-title h1 {
    font-size: clamp(1.2rem, 2.5vw, 1.8rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.42);
    margin-bottom: 0.2rem;
  }
  #coaching-title p {
    font-size: clamp(0.78rem, 1.4vw, 0.92rem);
    font-style: italic;
    color: rgba(0,0,0,0.22);
    letter-spacing: 0.04em;
  }

  /* ── Colour panel — full area, single colour ── */
  #color-panel {
    flex-shrink: 0;
    width: min(480px, 88vw);
    height: min(160px, 24vh);
    border: 2px solid rgba(0,0,0,0.16);
    border-radius: 6px;
    background-color: #f4f4f2;   /* starts as page bg = "white/no voice" */
    transition: background-color 1.0s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #panel-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    opacity: 0;
    transition: opacity 0.6s;
  }
  #panel-label.visible { opacity: 1; }

  /* Countdown dots — three small dots that fill one by one */
  #countdown-dots {
    position: absolute;
    bottom: 8px; right: 10px;
    display: flex; gap: 4px;
    opacity: 0.35;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    transition: background 0.15s;
  }
  .dot.active { background: rgba(255,255,255,0.95); }

  /* ── Timeline graph ── */
  #graph-wrap {
    flex-shrink: 0;
    width: min(480px, 88vw);
    position: relative;
  }
  #graph-title {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.25);
    margin-bottom: 0.4rem;
  }
  #graph-canvas {
    display: block;
    width: 100%;
    border: 1.5px solid rgba(0,0,0,0.12);
    border-radius: 4px;
    background: #ffffff;
  }

  /* ── Y-axis labels ── */
  #y-labels {
    position: absolute;
    right: calc(100% + 6px);
    top: 20px; /* offset for graph-title */
    height: 90px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }
  .y-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.52rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.22);
    line-height: 1;
  }

  /* ── Instructions ── */
  #instructions {
    text-align: center;
    flex-shrink: 0;
  }
  #instructions p {
    font-size: clamp(0.74rem, 1.4vw, 0.86rem);
    font-weight: 300;
    color: rgba(0,0,0,0.25);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  /* ── Debug ── */
  #debug {
    position: fixed; bottom: 1rem; right: 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: rgba(0,0,0,0.18);
    letter-spacing: 0.06em;
    line-height: 1.9;
    text-align: right;
    z-index: 200;
  }
</style>
</head>
<body>

<!-- ── Start screen ── -->
<div id="start-screen">
  <h1>Voice Coaching</h1>
  <p class="sub">See how your voice moves</p>
  <button id="start-btn">
    <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
      <circle cx="6" cy="6" r="5.5" stroke="currentColor"/>
      <path d="M4.5 4l4 2-4 2V4z" fill="currentColor"/>
    </svg>
    Allow microphone
  </button>
</div>

<!-- ── Coaching screen ── -->
<div id="coaching-screen">
  <div id="coaching-title">
    <h1>Voice Coaching</h1>
    <p>See how your voice moves</p>
  </div>

  <!-- Single-colour panel -->
  <div id="color-panel">
    <span id="panel-label"></span>
    <div id="countdown-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>
  </div>

  <!-- Timeline graph -->
  <div id="graph-wrap">
    <div id="graph-title">Intonation over time (per 3 s)</div>
    <div style="position:relative">
      <div id="y-labels">
        <span class="y-label" style="color:hsl(5,82%,46%)">Expr.</span>
        <span class="y-label" style="color:hsl(135,68%,36%)">Normal</span>
        <span class="y-label" style="color:hsl(225,82%,48%)">Mono</span>
      </div>
      <canvas id="graph-canvas" height="90"></canvas>
    </div>
  </div>

  <div id="instructions">
    <p>Blue = monotone &nbsp;·&nbsp; Green = normal &nbsp;·&nbsp; Red = expressive</p>
    <p>Panel updates every 3 seconds</p>
  </div>
</div>

<div id="debug">
  <span id="dbg-hz">— Hz</span><br/>
  <span id="dbg-st">— st</span><br/>
  <span id="dbg-score">score —</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  VOICE COACHING
//
//  Measurement: every MEASURE_INTERVAL ms (3 s)
//    → collect all voiced pitch frames in that window
//    → compute 10th–90th percentile semitone range
//    → map to score, update panel colour + graph
//
//  Calibration from librosa pyin on reference files (2 s windows):
//    Monotone   median ~7 st  → score ~0.27  → BLUE
//    Normal     median ~10 st → score ~0.47  → GREEN
//    Expressive median ~11 st → score ~0.53  → GREEN/RED border
//
//  Score formula:  clamp( (semitones - 3) / 15, 0, 1 )
//  Color zones (hard, not blended):
//    voice absent  → bg colour (off-white, "no reading")
//    0.00 – 0.40   → BLUE   (monotone)
//    0.40 – 0.70   → GREEN  (normal)
//    0.70 – 1.00   → RED    (expressive)
// ═══════════════════════════════════════════════════════════

(function () {
  'use strict';

  const MEASURE_INTERVAL = 3000;   // ms per measurement window
  const SILENCE_TIMEOUT  = 1200;   // ms quiet before "no voice"
  const MAX_GRAPH_POINTS = 40;     // how many points to keep in graph history

  // ── DOM ──
  const startScreen   = document.getElementById('start-screen');
  const coachingScreen= document.getElementById('coaching-screen');
  const startBtn      = document.getElementById('start-btn');
  const colorPanel    = document.getElementById('color-panel');
  const panelLabel    = document.getElementById('panel-label');
  const dots          = [document.getElementById('d0'),
                         document.getElementById('d1'),
                         document.getElementById('d2')];
  const canvas        = document.getElementById('graph-canvas');
  const ctx           = canvas.getContext('2d');
  const dbgHz         = document.getElementById('dbg-hz');
  const dbgSt         = document.getElementById('dbg-st');
  const dbgScore      = document.getElementById('dbg-score');

  // ── State ──
  let audioCtx      = null;
  let analyser      = null;
  let buffer        = null;
  let isListening   = false;
  let pitchBuffer   = [];       // Hz values in current window
  let hasVoice      = false;
  let silenceTimer  = null;
  let windowStart   = 0;
  let graphHistory  = [];       // [{score, hasVoice}]  one per measurement
  let currentScore  = -1;       // -1 = no voice yet

  // ─────────────────────────────────────────────
  //  YIN PITCH DETECTION
  // ─────────────────────────────────────────────
  function yinPitch(float32, sampleRate) {
    const half = Math.floor(float32.length / 2);
    const threshold = 0.12;
    const diff = new Float32Array(half);
    for (let tau = 1; tau < half; tau++) {
      let s = 0;
      for (let i = 0; i < half; i++) {
        const d = float32[i] - float32[i + tau];
        s += d * d;
      }
      diff[tau] = s;
    }
    const cmnd = new Float32Array(half);
    cmnd[0] = 1;
    let running = 0;
    for (let tau = 1; tau < half; tau++) {
      running += diff[tau];
      cmnd[tau] = diff[tau] * tau / running;
    }
    let tau = 2;
    while (tau < half) {
      if (cmnd[tau] < threshold) {
        while (tau + 1 < half && cmnd[tau + 1] < cmnd[tau]) tau++;
        break;
      }
      tau++;
    }
    if (tau === half || cmnd[tau] >= threshold) return -1;
    if (tau > 0 && tau < half - 1) {
      const s0 = cmnd[tau-1], s1 = cmnd[tau], s2 = cmnd[tau+1];
      tau += (s2 - s0) / (2 * (2*s1 - s2 - s0));
    }
    return sampleRate / tau;
  }

  // ─────────────────────────────────────────────
  //  SEMITONE SCORE
  // ─────────────────────────────────────────────
  function semitoneScore(pitches) {
    if (pitches.length < 5) return null;  // null = not enough data
    const sorted = [...pitches].sort((a, b) => a - b);
    const n   = sorted.length;
    const p10 = sorted[Math.max(0, Math.floor(n * 0.10))];
    const p90 = sorted[Math.min(n-1, Math.floor(n * 0.90))];
    if (p10 <= 0 || p90 <= p10) return 0;
    const semitones = 12 * Math.log2(p90 / p10);
    dbgSt.textContent = semitones.toFixed(1) + ' st';
    return Math.max(0, Math.min((semitones - 3) / 15, 1.0));
  }

  // ─────────────────────────────────────────────
  //  SCORE → COLOR  (three hard zones)
  // ─────────────────────────────────────────────
  function scoreToHSL(score) {
    if (score === null || score < 0) return null;   // no voice → no colour
    if (score < 0.40) return { h: 225, s: 82, l: 48 };   // BLUE
    if (score < 0.70) return { h: 135, s: 65, l: 38 };   // GREEN
    return                  { h:   5, s: 82, l: 46 };    // RED
  }

  function hslCSS(c) {
    return c ? `hsl(${c.h},${c.s}%,${c.l}%)` : '#f4f4f2';
  }

  function labelFor(score) {
    if (score === null || score < 0) return '';
    if (score < 0.40) return 'Monotone';
    if (score < 0.70) return 'Normal';
    return 'Expressive';
  }

  // ─────────────────────────────────────────────
  //  UPDATE PANEL
  // ─────────────────────────────────────────────
  function updatePanel(score) {
    const c = scoreToHSL(score);
    colorPanel.style.backgroundColor = hslCSS(c);
    const lbl = labelFor(score);
    panelLabel.textContent = lbl;
    panelLabel.classList.toggle('visible', lbl !== '');
    currentScore = score !== null ? score : -1;
    dbgScore.textContent = score !== null ? 'score ' + score.toFixed(3) : 'score —';
  }

  // ─────────────────────────────────────────────
  //  DRAW GRAPH
  //
  //  X axis: time (one point per 3 s measurement)
  //  Y axis: score 0–1
  //  Line colour: matches zone colour per segment
  //  Null points (silence) draw a gap
  // ─────────────────────────────────────────────
  function drawGraph() {
    const W = canvas.offsetWidth;
    const H = canvas.height;
    canvas.width = W;   // sync pixel width

    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Zone bands (very subtle)
    const zoneAlpha = 0.06;
    // Red zone top
    ctx.fillStyle = `hsla(5,82%,46%,${zoneAlpha})`;
    ctx.fillRect(0, 0, W, H * 0.30);
    // Green zone middle
    ctx.fillStyle = `hsla(135,65%,38%,${zoneAlpha})`;
    ctx.fillRect(0, H * 0.30, W, H * 0.30);
    // Blue zone bottom
    ctx.fillStyle = `hsla(225,82%,48%,${zoneAlpha})`;
    ctx.fillRect(0, H * 0.60, W, H * 0.40);

    // Zone boundary lines
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth = 1;
    [0.30, 0.60].forEach(frac => {
      ctx.beginPath();
      ctx.moveTo(0, H * frac);
      ctx.lineTo(W, H * frac);
      ctx.stroke();
    });

    const pts = graphHistory;
    if (pts.length < 2) return;

    const n = pts.length;
    const xStep = W / (MAX_GRAPH_POINTS - 1);

    // Draw line segments, coloured by zone
    for (let i = 1; i < n; i++) {
      const prev = pts[i - 1];
      const curr = pts[i];
      if (prev.score === null || curr.score === null) continue;  // gap

      const x0 = (MAX_GRAPH_POINTS - n + i - 1) * xStep;
      const x1 = (MAX_GRAPH_POINTS - n + i)     * xStep;
      const y0 = H - prev.score * H;
      const y1 = H - curr.score * H;

      const c = scoreToHSL(curr.score);
      ctx.strokeStyle = hslCSS(c);
      ctx.lineWidth   = 2.5;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();
    }

    // Draw dots at each measurement
    pts.forEach((pt, i) => {
      if (pt.score === null) return;
      const x = (MAX_GRAPH_POINTS - n + i) * xStep;
      const y = H - pt.score * H;
      const c = scoreToHSL(pt.score);
      ctx.fillStyle = hslCSS(c);
      ctx.beginPath();
      ctx.arc(x, y, 3.5, 0, Math.PI * 2);
      ctx.fill();
    });

    // "Now" indicator line
    const nowX = (MAX_GRAPH_POINTS - 1) * xStep;
    if (pts.length > 0 && pts[pts.length-1].score !== null) {
      ctx.strokeStyle = 'rgba(0,0,0,0.12)';
      ctx.lineWidth   = 1;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(nowX, 0);
      ctx.lineTo(nowX, H);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // ─────────────────────────────────────────────
  //  COUNTDOWN DOTS (3 dots fill L→R over 3 s)
  // ─────────────────────────────────────────────
  function animateDots() {
    if (!isListening) return;
    requestAnimationFrame(animateDots);
    const elapsed  = performance.now() - windowStart;
    const fraction = (elapsed % MEASURE_INTERVAL) / MEASURE_INTERVAL;
    // 3 dots: dot i lights up when fraction > i/3
    dots.forEach((dot, i) => {
      dot.classList.toggle('active', fraction > (i + 0.5) / 3);
    });
  }

  // ─────────────────────────────────────────────
  //  MEASUREMENT — runs every MEASURE_INTERVAL ms
  // ─────────────────────────────────────────────
  function runMeasurement() {
    const voiced = pitchBuffer.filter(hz => hz > 60 && hz < 600);
    let score = null;

    if (voiced.length >= 5) {
      score = semitoneScore(voiced);
    } else if (!hasVoice) {
      score = null;   // silence
    } else {
      score = currentScore >= 0 ? currentScore : null;  // hold previous
    }

    graphHistory.push({ score });
    if (graphHistory.length > MAX_GRAPH_POINTS) graphHistory.shift();

    updatePanel(score);
    drawGraph();

    pitchBuffer  = [];
    windowStart  = performance.now();
    setTimeout(runMeasurement, MEASURE_INTERVAL);
  }

  // ─────────────────────────────────────────────
  //  AUDIO SAMPLING LOOP (every rAF — collects pitch only)
  // ─────────────────────────────────────────────
  function sampleLoop() {
    if (!isListening) return;
    requestAnimationFrame(sampleLoop);

    analyser.getFloatTimeDomainData(buffer);
    let rms = 0;
    for (let i = 0; i < buffer.length; i++) rms += buffer[i] * buffer[i];
    rms = Math.sqrt(rms / buffer.length);

    if (rms > 0.006) {
      hasVoice = true;
      if (silenceTimer) { clearTimeout(silenceTimer); silenceTimer = null; }
      const hz = yinPitch(buffer, audioCtx.sampleRate);
      if (hz > 60 && hz < 600) {
        pitchBuffer.push(hz);
        dbgHz.textContent = hz.toFixed(0) + ' Hz';
      }
    } else {
      if (!silenceTimer) {
        silenceTimer = setTimeout(() => { hasVoice = false; silenceTimer = null; }, SILENCE_TIMEOUT);
      }
      dbgHz.textContent = '— Hz';
    }
  }

  // ─────────────────────────────────────────────
  //  STARTUP
  // ─────────────────────────────────────────────
  async function startAudio() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      audioCtx  = new (window.AudioContext || window.webkitAudioContext)();
      const src = audioCtx.createMediaStreamSource(stream);
      analyser  = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      analyser.smoothingTimeConstant = 0;
      src.connect(analyser);
      buffer = new Float32Array(analyser.fftSize);

      isListening = true;
      windowStart = performance.now();

      startScreen.classList.add('hidden');
      setTimeout(() => coachingScreen.classList.add('visible'), 500);

      sampleLoop();
      animateDots();
      setTimeout(runMeasurement, MEASURE_INTERVAL);

    } catch (err) {
      startBtn.textContent = 'Microphone access denied';
      startBtn.style.opacity = '0.5';
      startBtn.style.cursor  = 'default';
    }
  }

  startBtn.addEventListener('click', () => {
    startBtn.textContent = 'Listening…';
    startBtn.disabled    = true;
    startAudio();
  });

  // Redraw graph on resize
  window.addEventListener('resize', drawGraph);

})();
</script>
</body>
</html>
